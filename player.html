<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Reading Practice</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- ===== LESSON HUB ===== -->
    <div class="hub-view" id="hubView">
        <a class="back-btn" href="index.html" title="Back to weeks">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <div class="tile-grid" id="tileGrid"></div>
    </div>

    <!-- ===== ACTIVITY (reading) ===== -->
    <div class="activity-view" id="activityView" style="display:none;">
        <button class="back-btn" id="activityBack" title="Back to lesson">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>
        <div class="practice-content">
            <div class="dots-container" id="dotsContainer"></div>
            <div class="reading-lines" id="readingLines"></div>
            <button class="nav-btn prev-btn" id="prevBtn"></button>
            <button class="nav-btn next-btn" id="nextBtn"></button>
        </div>
    </div>

    <!-- ===== SECTION-COMPLETE TRANSITION ===== -->
    <div class="transition" id="transition">
        <div class="confetti-container" id="transitionConfetti"></div>
        <div class="transition-text">Good job!</div>
    </div>

    <!-- ===== DAY-COMPLETE PRESENT ===== -->
    <div class="present-container" id="presentContainer">
        <div class="present" id="present">
            <div class="present-box"><div class="present-lid"></div></div>
            <div class="present-bow"></div>
        </div>
        <div class="confetti-container" id="confettiContainer"></div>
        <div class="prize" id="prize">
            <div class="prize-emoji">🏆</div>
            <div class="prize-text">Great Job!</div>
            <div class="prize-buttons">
                <a class="play-again-btn" href="index.html">Back to start</a>
            </div>
        </div>
    </div>

    <script src="js/weeks.js"></script>
    <script src="js/lessons.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
